  return count;
}

// ── ORDER TRACKING WITH ANIMATED STEPPER ──
function OrderTrackingModal({isOpen, onClose, orders}){
  const [email, setEmail] = useState('');
  const [orderId, setOrderId] = useState('');
  const [found, setFound] = useState(null);
  const [stepperStatus, setStepperStatus] = useState('processing');

  const handleSearch = () => {
    const order = orders.find(o => o.orderId === orderId && o.customer.email.toLowerCase() === email.toLowerCase());
    setFound(order || null);
    if (order) {
      if (order.status === 'Shipped') setStepperStatus('shipped');
      else if (order.status === 'Delivered') setStepperStatus('delivered');
      else setStepperStatus('processing');
    }
  };

  useEffect(() => { if (!isOpen) { setEmail(''); setOrderId(''); setFound(null); } }, [isOpen]);

  if (!isOpen) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm p-4" onClick={onClose}>
      <div className="bg-base rounded-3xl p-8 max-w-lg w-full shadow-2xl animate-scale-in" onClick={e => e.stopPropagation()}>
        <h3 className="font-display text-2xl font-bold text-ink mb-4">Track Your Order</h3>
        {!found ? (
          <div className="space-y-3">
            <input placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-3 border border-gold/20 rounded-xl bg-base text-ink"/>
            <input placeholder="Order ID" value={orderId} onChange={e => setOrderId(e.target.value)} className="w-full p-3 border border-gold/20 rounded-xl bg-base text-ink"/>
            <button onClick={handleSearch} className="w-full py-3 bg-rose text-base rounded-xl font-semibold">Find Order</button>
            {email && found === null && <p className="text-rose text-sm mt-3">No order found.</p>}
          </div>
        ) : (
          <div>
            <div className="mb-4">
              <p className="text-sm text-muted">Order #{found.orderId}</p>
              <p className="text-sm text-muted">{found.date}</p>
            </div>
            <div className="stepper-timeline">
              <div className="stepper-fill" style={{ height: stepperStatus === 'processing' ? '0%' : stepperStatus === 'shipped' ? '50%' : '100%' }}></div>
              <div className={`step ${stepperStatus !== 'processing' ? 'active' : ''}`}>
                <div className="step-circle"></div>
                <div className="step-content">
                  <h3 className="font-semibold">Order Verified</h3>
                  <p className="text-xs text-muted">Your payment has been processed.</p>
                </div>
              </div>
              <div className={`step ${stepperStatus === 'shipped' || stepperStatus === 'delivered' ? 'active' : ''}`}>
                <div className="step-circle"></div>
                <div className="step-content">
                  <h3 className="font-semibold">Item Dispatched</h3>
                  <p className="text-xs text-muted">Package is on its way to you.</p>
                </div>
              </div>
              <div className={`step ${stepperStatus === 'delivered' ? 'active' : ''}`}>
                <div className="step-circle"></div>
                <div className="step-content">
                  <h3 className="font-semibold">Delivered</h3>
                  <p className="text-xs text-muted">Enjoy your handcrafted item!</p>
                </div>
              </div>
            </div>
            <div className="mt-6 flex justify-between items-center">
              <span className="text-sm text-muted">Status: <span className="font-medium text-ink">{found.status}</span></span>
              <button onClick={() => { setFound(null); setEmail(''); setOrderId(''); }} className="text-sm text-gold hover:underline">Track another</button>
            </div>
          </div>
        )}
        <button onClick={onClose} className="mt-4 w-full text-sm text-muted">Close</button>
      </div>
    </div>
  );
}

// ── LUXURY RECEIPT MODAL (PRINT OPTIMIZED) ──
function ReceiptModal({order, onClose}){
  if (!order) return null;
  const itemsTotal = order.items.reduce((sum, i) => sum + i.price * i.quantity, 0);
  const discountAmount = order.discount ? (itemsTotal * order.discount / 100) : 0;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm p-4" id="receiptModal" onClick={onClose}>
      <div className="receipt-paper" onClick={e => e.stopPropagation()}>
        <div className="receipt-header">
          <h2>ARTISAN HOUSE</h2>
          <p style={{ fontSize: '0.8rem' }}>Transaction Receipt • {order.date}</p>
        </div>
        <table style={{ width: '100%', fontSize: '0.9rem', lineHeight: '2' }}>
          <tbody>
            <tr><td><strong>Order ID:</strong></td><td style={{ textAlign: 'right' }}>{order.orderId}</td></tr>
            <tr><td><strong>Customer:</strong></td><td style={{ textAlign: 'right' }}>{order.customer.name}</td></tr>
            <tr><td><strong>Email:</strong></td><td style={{ textAlign: 'right' }}>{order.customer.email}</td></tr>
            <tr><td><strong>Address:</strong></td><td style={{ textAlign: 'right' }}>{order.customer.address}</td></tr>
          </tbody>
        </table>
        <div className="receipt-dashed"></div>
        <p><strong>Items:</strong></p>
        <div style={{ margin: '0.5rem 0' }}>
          {order.items.map((item, idx) => (
            <div key={idx}>{item.quantity}x {item.productName} — ₹{item.price.toLocaleString('en-IN')} each</div>
          ))}
        </div>
        {order.gift && <p style={{ fontStyle: 'italic', marginTop: '0.5rem' }}>Gift: {order.giftNote}</p>}
        <div className="receipt-dashed"></div>
        <table style={{ width: '100%', fontSize: '1rem' }}>
          <tbody>
            <tr><td>Subtotal</td><td style={{ textAlign: 'right' }}>₹{itemsTotal.toLocaleString('en-IN')}</td></tr>
            {order.discount > 0 && <tr><td>Discount ({order.discount}%)</td><td style={{ textAlign: 'right' }}>-₹{discountAmount.toLocaleString('en-IN')}</td></tr>}
            <tr style={{ fontWeight: 'bold', borderTop: '1px solid #000' }}><td style={{ paddingTop: '0.5rem' }}>Total</td><td style={{ textAlign: 'right' }}>₹{order.total.toLocaleString('en-IN')}</td></tr>
          </tbody>
        </table>
        <div className="btn-group" style={{ display: 'flex', gap: '1rem', marginTop: '2rem' }}>
          <button onClick={() => window.print()} style={{ flex: 1, padding: '0.8rem', background: '#1A3322', color: 'white', border: 'none', cursor: 'pointer' }}>Print Receipt</button>
          <button onClick={onClose} style={{ flex: 1, padding: '0.8rem', background: 'transparent', border: '1px solid #000', color: '#000', cursor: 'pointer' }}>Close</button>
        </div>
      </div>
    </div>
  );
}

  const handleLogin = () => { if (pass === adminPass) setAuth(true); };

function AdminDashboard({ products, setProducts, orders, setOrders, notifications, setNotifications, settings, setSettings, discountCodes, setDiscountCodes, onLogout }) {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [editingProduct, setEditingProduct] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [newProduct, setNewProduct] = useState({ name: '', category:'Toys', basePrice:500, geometry:'sphere', colors:'#F5E6D3,#D4A0A0', patterns:'solid,striped', sizes:'[{"name":"Standard","multiplier":1,"dims":"20cm"}]', image:'', material:'Cotton', care:'Hand wash', weight:'DK', yarnBrand:'', recommendedHookSize:'', careIcons:'hand-wash,dry-flat', geoParams: JSON.stringify(getDefaultGeoParams('sphere')) });
  const [orderSearch, setOrderSearch] = useState('');
  const [productSearch, setProductSearch] = useState('');

  const [loaderBgUrl, setLoaderBgUrl] = useState(settings.loaderBg);

  const totalRevenue = orders.reduce((s,o)=>s+o.total,0);
  const totalOrders = orders.length;
  const avgOrderValue = totalOrders>0?Math.round(totalRevenue/totalOrders):0;
  const topProduct = useMemo(()=>{const c={};orders.forEach(o=>o.items.forEach(i=>c[i.productName]=(c[i.productName]||0)+1));return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';},[orders]);
  const customers = useMemo(()=>{const m={};orders.forEach(o=>{if(!m[o.customer.email])m[o.customer.email]={name:o.customer.name,email:o.customer.email,orders:0,spent:0};m[o.customer.email].orders++;m[o.customer.email].spent+=o.total;});return Object.values(m);},[orders]);

    const np = { id, name:newProduct.name, category:newProduct.category, basePrice:newProduct.basePrice, geometry:newProduct.geometry, colors:newProduct.colors.split(',').map(c=>c.trim()), patterns:newProduct.patterns.split(',').map(p=>p.trim()), sizes, image:newProduct.image||'https://images.unsplash.com/photo-1604881991720-f91add269bed?w=400&q=80', material:newProduct.material, care:newProduct.care, weight:newProduct.weight, yarnBrand:newProduct.yarnBrand, recommendedHookSize:newProduct.recommendedHookSize, careIcons:newProduct.careIcons.split(',').map(ic=>ic.trim()), geoParams, inStock:true, reviews:[] };
    setProducts([...products,np]);
    setShowAddForm(false);

  const handleUpdateProduct = ()=>{
    if(!editingProduct)return;
    let sizes, geoParams;
    try{sizes=typeof editingProduct.sizes==='string'?JSON.parse(editingProduct.sizes):editingProduct.sizes;}catch(e){alert('Invalid sizes');return;}
    try{geoParams=typeof editingProduct.geoParams==='string'?JSON.parse(editingProduct.geoParams):editingProduct.geoParams;}catch(e){alert('Invalid geoParams');return;}
    const updated = {...editingProduct, colors:Array.isArray(editingProduct.colors)?editingProduct.colors:editingProduct.colors.split(',').map(c=>c.trim()), patterns:Array.isArray(editingProduct.patterns)?editingProduct.patterns:editingProduct.patterns.split(',').map(p=>p.trim()), sizes, geoParams, careIcons: Array.isArray(editingProduct.careIcons)?editingProduct.careIcons:editingProduct.careIcons.split(',').map(ic=>ic.trim()) };
    setProducts(products.map(p=>p.id===updated.id?updated:p));
    setEditingProduct(null);
  };

  const saveSettings = () => {
    const newSettings = { catImage: catImageUrl, loaderBg: loaderBgUrl };
    setSettings(newSettings);
    localStorage.setItem('cc_settings', JSON.stringify(newSettings));
    alert('Settings saved!');
  };

  const handleImageUpload = (e, setter, current) => { const file = e.target.files?.[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => setter(ev.target.result); reader.readAsDataURL(file); };

  const exportCSV = ()=>{const csv="OrderID,Date,Customer,Items,Total\n"+orders.map(o=>`${o.orderId},${o.date},${o.customer.name},"${o.items.map(i=>i.productName+' x'+i.quantity).join(';')}",${o.total}`).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv]));a.download='orders.csv';a.click();};

  const salesChartRef = useRef(null);
  useEffect(()=>{ if(activeTab==='dashboard'&&salesChartRef.current&&orders.length>0){ const ctx=salesChartRef.current.getContext('2d'); const cw=salesChartRef.current.clientWidth||400; salesChartRef.current.width=cw; ctx.clearRect(0,0,cw,150); const today=new Date(); const last7=[]; for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);last7.push(d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}));} const daily={}; orders.forEach(o=>{const d=new Date(o.date);if(!isNaN(d)){const key=d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});daily[key]=(daily[key]||0)+o.total;}}); const values=last7.map(day=>daily[day]||0); const max=Math.max(...values,1); const barWidth=Math.max(15,(cw-20)/last7.length-8), gap=Math.max(4,barWidth*0.2); last7.forEach((day,i)=>{const x=i*(barWidth+gap)+5; const barHeight=(values[i]/max)*120; ctx.fillStyle='#8C7A6B'; ctx.fillRect(x,140-barHeight,barWidth,barHeight); ctx.fillStyle='#222222'; ctx.font='9px Inter'; ctx.fillText(day,x,155);}); } },[orders,activeTab]);

  const filteredOrders = orders.filter(o=>{if(!orderSearch)return true; const s=orderSearch.toLowerCase(); return o.orderId.toLowerCase().includes(s)||o.customer.name.toLowerCase().includes(s);});
  const filteredProducts = products.filter(p=>{const matchCat=productCategoryFilter==='All'||p.category===productCategoryFilter; const matchSearch=p.name.toLowerCase().includes(productSearch.toLowerCase()); return matchCat&&matchSearch;});

    const newCodes = { ...discountCodes, [code]: parseFloat(discPercentInput) };

    setDiscCodeInput('');
    setDiscPercentInput(10);

  const removeDiscountCode = (code) => {

    setDiscountCodes(newCodes);
  };

  const ImagePreview = ({ src }) => { if (!src) return null; return <img src={src} alt="preview" className="w-24 h-24 object-cover rounded-xl border border-gold/20 mt-2" />; };

  return (
    <div className="fixed inset-0 z-50 flex bg-obsidian">

  const [loading, setLoading] = useState(true);
  const [heroVisible, setHeroVisible] = useState(false);
  const [settings, setSettings] = useState(() => { const saved = localStorage.getItem('cc_settings'); return saved ? JSON.parse(saved) : DEFAULT_SETTINGS; });
  const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('cc_products')) || DEFAULT_PRODUCTS);
  const [orders, setOrders] = useState(() => JSON.parse(localStorage.getItem('cc_orders')) || []);
  const [notifications, setNotifications] = useState(() => JSON.parse(localStorage.getItem('cc_notifications')) || []);
  const [discountCodes, setDiscountCodes] = useState(() => JSON.parse(localStorage.getItem('cc_discounts')) || DEFAULT_DISCOUNT_CODES);
  const [selected, setSelected] = useState(products[0]);
  const [color, setColor] = useState(products[0].colors[0]);
  const [pattern, setPattern] = useState(products[0].patterns[0]);
  const [size, setSize] = useState(products[0].sizes[0]);
  const [cart, setCart] = useState(() => JSON.parse(localStorage.getItem('cc_cart')) || []);
  const [wishlist, setWishlist] = useState(() => JSON.parse(localStorage.getItem('cc_wishlist')) || []);
  const [cartOpen, setCartOpen] = useState(false);
  const [wishOpen, setWishOpen] = useState(false);
  const [checkoutStep, setCheckoutStep] = useState(null);
  const [gift, setGift] = useState(false);
  const [giftNote, setGiftNote] = useState('');
  const [customerForm, setCustomerForm] = useState(null);
  const [receiptOrder, setReceiptOrder] = useState(null);
  const [trackOpen, setTrackOpen] = useState(false);
  const [detailProduct, setDetailProduct] = useState(null);
  const [scrollY, setScrollY] = useState(0);
  const [discountCode, setDiscountCode] = useState('');
  const [appliedDiscount, setAppliedDiscount] = useState(0);
  const [discountError, setDiscountError] = useState('');
  const [cartBounce, setCartBounce] = useState(false);
  const [addFeedback, setAddFeedback] = useState(false);
  const [visitorCount, setVisitorCount] = useState(42);
  const [emailPopupVisible, setEmailPopupVisible] = useState(false);
  const [emailSubmitted, setEmailSubmitted] = useState(false);

  const canvasRef = useRef(null);
  useThreeScene(canvasRef, selected, color, pattern, size);

  useEffect(() => { if (!loading) setTimeout(() => setHeroVisible(true), 100); }, [loading]);
  useEffect(()=>{localStorage.setItem('cc_settings',JSON.stringify(settings));},[settings]);
  useEffect(()=>{localStorage.setItem('cc_products',JSON.stringify(products));},[products]);
  useEffect(()=>{localStorage.setItem('cc_cart',JSON.stringify(cart));},[cart]);
  useEffect(()=>{localStorage.setItem('cc_wishlist',JSON.stringify(wishlist));},[wishlist]);
  useEffect(()=>{localStorage.setItem('cc_orders',JSON.stringify(orders));},[orders]);
  useEffect(()=>{localStorage.setItem('cc_notifications',JSON.stringify(notifications));},[notifications]);
  useEffect(()=>{localStorage.setItem('cc_discounts',JSON.stringify(discountCodes));},[discountCodes]);
  useEffect(()=>{const h=()=>setScrollY(window.scrollY);window.addEventListener('scroll',h,{passive:true});return ()=>window.removeEventListener('scroll',h);},[]);

  useEffect(() => {
    const interval = setInterval(() => {
      setVisitorCount(prev => Math.max(2, prev + Math.floor(Math.random() * 7) - 3));
    }, 5000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    if (localStorage.getItem('subscribed')) return;
    const timer = setTimeout(() => setEmailPopupVisible(true), 10000);
    return () => clearTimeout(timer);
  }, []);

  const handleEmailSubmit = (e) => { e.preventDefault(); localStorage.setItem('subscribed', 'true'); setEmailSubmitted(true); };

  const selectProduct = (p) => { setSelected(p); setColor(p.colors[0]); setPattern(p.patterns[0]); setSize(p.sizes[0]); document.getElementById('customize')?.scrollIntoView({behavior:'smooth'}); };
  const addToCart = () => { if (!selected.inStock) return; setCart([...cart, { productId: selected.id, productName: selected.name, color, pattern, sizeName: size.name, price: Math.round(selected.basePrice * size.multiplier), quantity: 1 }]); setAddFeedback(true); setCartBounce(true); document.getElementById('feedback-message').textContent = 'Item added to cart'; setTimeout(() => { setAddFeedback(false); setCartBounce(false); }, 1000); };
  const addToWishlist = () => { setWishlist([...wishlist, { productId: selected.id, productName: selected.name, color, pattern, sizeName: size.name }]); };
  const moveWishToCart = (i) => { const w = wishlist[i]; const prod = products.find(p => p.id === w.productId); if (prod) { const sz = prod.sizes.find(s => s.name === w.sizeName) || prod.sizes[0]; setCart([...cart, { ...w, price: Math.round(prod.basePrice * sz.multiplier), quantity: 1 }]); } setWishlist(wishlist.filter((_, idx) => idx !== i)); };
  const placeOrder = (customer) => { const order = { orderId: 'CC-' + Date.now().toString(36), date: new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' }), customer, items: cart.map(i => ({ ...i })), gift, giftNote, discount: appliedDiscount, total: cart.reduce((s, i) => s + i.price * (i.quantity || 1), 0) * (1 - appliedDiscount/100), status: 'Processing' }; setOrders([...orders, order]); setCart([]); setAppliedDiscount(0); setDiscountCode(''); setReceiptOrder(order); setCheckoutStep(null); };
  const handleNotify = (product) => { const email = prompt('Enter your email to be notified when this item is back in stock:'); if (email) { setNotifications([...notifications, { email, productName: product.name, date: new Date().toLocaleDateString('en-IN') }]); alert('You will be notified!'); } };
  const applyDiscount = () => { const code = discountCode.trim().toUpperCase(); if (discountCodes[code]) { setAppliedDiscount(discountCodes[code]); setDiscountError(''); } else { setAppliedDiscount(0); setDiscountError('Invalid discount code'); } };
  const cartTotal = cart.reduce((s,i)=>s+i.price*(i.quantity||1),0);
  const discountedTotal = cartTotal * (1 - appliedDiscount/100);

  const downloadCanvasImage = () => {
    const canvas = document.querySelector('#three-canvas canvas');
    if (!canvas) return;
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `crochetcraft-${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(url);
    });
  };

  useEffect(() => {
    const manifest = {
      name: "CrochetCraft 3D",
      short_name: "CrochetCraft",
      start_url: ".",
      display: "standalone",
      background_color: "#FDFBF7",
      theme_color: "#E0B89C",
      icons: [{ src: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#E0B89C"/><text x="50" y="55" text-anchor="middle" fill="white" font-size="18" font-family="serif">CC</text></svg>'), sizes: "192x192", type: "image/svg+xml" }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const manifestURL = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);
  }, []);

  useEffect(() => {
    if ('serviceWorker' in navigator) {
      const swCode = `const CACHE_NAME = 'crochet-v1';self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.add('/'))); });self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(resp => resp || fetch(e.request))); });`;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swURL = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swURL);
    }
  }, []);

  if (loading) return <LoadingScreen onComplete={() => setLoading(false)} bgImage={settings.loaderBg} />;

  return (
    <div className="min-h-screen bg-base">
      <a href="#main-content" className="skip-link">Skip to main content</a>
      <div id="feedback-message" className="sr-only" aria-live="polite"></div>

      <Navbar cartCount={cart.reduce((s,i)=>s+(i.quantity||1),0)} wishlistCount={wishlist.length} onCartClick={()=>setCartOpen(true)} onWishlistClick={()=>setWishOpen(true)} scrollY={scrollY} cartBounce={cartBounce}/>
      
      <main id="main-content">
        <section className="relative pt-36 pb-10 text-center px-6 overflow-hidden">
          <FloatingBackground />
          <div className="relative z-10">
            <div className={`transition-all duration-700 ${heroVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`} style={{ transitionDelay: '100ms' }}><h1 className="font-display text-5xl md:text-7xl font-bold">Bespoke <span className="italic text-rose">Crochet</span></h1></div>
            <div className={`transition-all duration-700 ${heroVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`} style={{ transitionDelay: '300ms' }}><p className="mt-4 max-w-xl mx-auto text-muted">Design every stitch in 3D. Real‑time colors, patterns, sizes — your creation comes to life.</p></div>
            <div className={`transition-all duration-700 ${heroVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`} style={{ transitionDelay: '500ms' }}><a href="#customize" className="inline-block mt-8 px-10 py-4 btn-primary rounded-full">Begin Designing</a></div>
          </div>
        </section>

        <AsSeenIn />
        <FadeInSection><MakerStory catImage={settings.catImage} /></FadeInSection>

        <section id="customize" className="pt-10 pb-16 px-6 max-w-7xl mx-auto">
          <div className="grid lg:grid-cols-5 gap-8">
            <div className="lg:col-span-3">
              <div ref={canvasRef} id="three-canvas" className="w-full h-[460px] rounded-[2rem] shadow-2xl" />
              <div className="flex gap-2 mt-4 justify-center">
                <button onClick={downloadCanvasImage} className="px-4 py-2 bg-base border border-gold/30 rounded-xl text-sm flex items-center gap-2" aria-label="Save design as image">📸 Save Image</button>
                <a id="ar-link" rel="ar" href="/models/bunny.usdz" style={{display:'none'}}><img src="" alt="AR view" /></a>
                <button onClick={() => document.getElementById('ar-link').click()} className="px-4 py-2 bg-base border border-gold/30 rounded-xl text-sm flex items-center gap-2">✨ View in Your Room</button>
              </div>
              <p className="text-xs text-center text-muted mt-2">👁️ {visitorCount} people are customising now</p>
            </div>
            <div className="lg:col-span-2 space-y-5">
              <div className="glass-card p-5"><h3 className="font-display text-xl font-bold mb-3">Color</h3><div className="flex flex-wrap gap-3">{selected.colors.map(c=><button key={c} className={`color-swatch w-10 h-10 ${color===c?'selected':''}`} style={{backgroundColor:c}} onClick={()=>setColor(c)} title={`Color ${c}`} aria-label={`Select color ${c}`} />)}</div></div>
              <div className="glass-card p-5"><h3 className="font-display text-xl font-bold mb-3">Pattern</h3><div className="flex flex-wrap gap-3">{selected.patterns.map(p=><button key={p} className={`pattern-option px-4 py-2 flex items-center gap-2 ${pattern===p?'selected':''}`} onClick={()=>setPattern(p)}><PatternPreview pattern={p} color={color}/><span className="capitalize">{p}</span></button>)}</div></div>
              <div className="glass-card p-5"><h3 className="font-display text-xl font-bold mb-3">Size</h3><div className="flex flex-wrap gap-3">{selected.sizes.map(s=><button key={s.name} className={`size-btn px-4 py-2 ${size.name===s.name?'selected':''}`} onClick={()=>setSize(s)}>{s.name}<span className="block text-xs">₹{Math.round(selected.basePrice*s.multiplier)}</span></button>)}</div></div>
              <div className="glass-card p-4 text-sm space-y-1"><p><span className="font-medium">Material:</span> {selected.material}</p><p><span className="font-medium">Care:</span> {selected.care}</p><p><span className="font-medium">Weight:</span> {selected.weight}</p><p><span className="font-medium">Brand:</span> {selected.yarnBrand}</p><p><span className="font-medium">Hook:</span> {selected.recommendedHookSize}</p></div>
              <div className="flex gap-3">
                <button onClick={addToCart} disabled={!selected.inStock} className={`flex-1 py-4 btn-primary rounded-2xl transition-colors duration-300 ${addFeedback ? 'bg-sage scale-105' : ''} ${!selected.inStock&&'opacity-50'}`} aria-label={addFeedback ? 'Added to cart' : 'Add to cart'}>{addFeedback ? 'Added ✓' : 'Add to Cart'}</button>
                <button onClick={addToWishlist} className="p-4 rounded-2xl border border-gold/40 text-gold" aria-label="Add to wishlist"><HeartIcon/></button>
              </div>
              <div className="flex items-center gap-2 mt-3">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1A3322" strokeWidth="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                <span className="text-xs text-sage">Ethically Handcrafted</span>
              </div>
              <p className="text-xs text-center text-muted">Made to order · Est. delivery <EstimatedDelivery/></p>
            </div>
          </div>
          <FadeInSection><ProductSlider products={products} onSelect={selectProduct} /></FadeInSection>
        </section>

        <FadeInSection>
          <section className="py-20 px-6 bg-base-dark/30">
            <div className="max-w-7xl mx-auto">
              <h2 className="font-display text-4xl font-bold text-center mb-10 text-ink">Our Collection</h2>
              <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
                {products.map((p,idx)=>(<FadeInSection key={p.id} delay={idx*100}><div className="glass-card overflow-hidden cursor-pointer" onClick={()=>setDetailProduct(p)}><div className="h-48 overflow-hidden"><img src={p.image} alt={p.name} className="w-full h-full object-cover transition duration-700 group-hover:scale-105" loading="lazy" decoding="async"/></div><div className="p-5"><p className="text-xs text-gold uppercase">{p.category}</p><h3 className="font-display text-lg font-bold text-ink">{p.name}</h3><p className="text-sm text-muted line-clamp-2">{p.description}</p><p className="font-semibold mt-2 text-ink">From ₹{p.basePrice.toLocaleString('en-IN')}</p>{!p.inStock&&<span className="text-xs text-rose">Sold Out</span>}</div></div></FadeInSection>))}
              </div>
            </div>
          </section>
        </FadeInSection>

        <FadeInSection><CustomerGallery /></FadeInSection>
      </main>

      <footer className="py-10 border-t border-gold/10 flex flex-col md:flex-row items-center justify-between px-6 max-w-7xl mx-auto text-sm text-muted">
        <div className="flex gap-6"><button onClick={()=>setTrackOpen(true)} className="hover:text-gold">Track Order</button><a href="#" className="hover:text-gold">Returns</a><a href="#" className="hover:text-gold">Privacy</a></div>
        <div className="flex items-center gap-3"><span>© 2026 CrochetCraft3D</span><AdminPanel products={products} setProducts={setProducts} orders={orders} setOrders={setOrders} notifications={notifications} setNotifications={setNotifications} settings={settings} setSettings={setSettings} discountCodes={discountCodes} setDiscountCodes={setDiscountCodes}/></div>
      </footer>

      {emailPopupVisible && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-ink/50 backdrop-blur-sm" onClick={() => setEmailPopupVisible(false)}>
          <div className="bg-base rounded-3xl p-8 max-w-sm mx-4 animate-scale-in" onClick={e => e.stopPropagation()}>
            {emailSubmitted ? (
              <div className="text-center">
                <p className="text-2xl">🎁</p>
                <h3 className="font-display text-2xl font-bold mt-2">Thank You!</h3>
                <p className="mt-2 text-muted">Use code <strong className="text-gold">WELCOME10</strong> for 10% off.</p>
                <button onClick={() => setEmailPopupVisible(false)} className="mt-4 text-sm text-muted">Close</button>
              </div>
            ) : (
              <form onSubmit={handleEmailSubmit}>
                <h3 className="font-display text-2xl font-bold">Get 10% Off</h3>
                <p className="text-sm text-muted mt-2">Join our newsletter for exclusive crochet inspiration and your discount.</p>
                <input type="email" required placeholder="Your email" className="w-full mt-4 p-3 border border-gold/20 rounded-xl bg-base" />
                <button type="submit" className="w-full mt-4 py-3 btn-primary rounded-xl">Claim Discount</button>
                <button type="button" onClick={() => setEmailPopupVisible(false)} className="w-full text-xs text-muted mt-2">No thanks</button>
              </form>
            )}
          </div>
        </div>
      )}

      {cartOpen && <div className="fixed inset-0 z-50 flex"><div className="fixed inset-0 bg-ink/30 backdrop-blur-sm" onClick={()=>setCartOpen(false)}></div><div className="fixed top-0 right-0 h-full w-full max-w-md bg-base shadow-2xl flex flex-col animate-slide-up"><div className="p-6 border-b border-gold/10 flex justify-between"><h2 className="font-display text-2xl font-bold">Cart</h2><button onClick={()=>setCartOpen(false)} aria-label="Close cart"><svg width="20" height="20" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div className="flex-1 overflow-y-auto p-6 space-y-4">{cart.map((item,i)=><div key={i} className="glass-card p-4 flex gap-4"><img src={products.find(p=>p.id===item.productId)?.image} className="w-16 h-16 object-cover rounded-xl" loading="lazy" decoding="async"/><div className="flex-1"><h4 className="font-semibold text-sm">{item.productName}</h4><p className="text-xs text-muted">{item.sizeName} · {item.pattern}</p><div className="flex items-center gap-2 mt-2"><button onClick={()=>setCart(cart.map((it,idx)=>idx===i?{...it,quantity:Math.max(1,it.quantity-1)}:it))} className="w-6 h-6 rounded-full bg-base-dark" aria-label="Decrease quantity">−</button><span>{item.quantity}</span><button onClick={()=>setCart(cart.map((it,idx)=>idx===i?{...it,quantity:it.quantity+1}:it))} className="w-6 h-6 rounded-full bg-base-dark" aria-label="Increase quantity">+</button></div></div><div className="text-right"><p className="font-semibold">₹{(item.price*item.quantity).toLocaleString('en-IN')}</p><button onClick={()=>setCart(cart.filter((_,idx)=>idx!==i))} className="text-xs text-rose mt-2">Remove</button></div></div>)}</div><div className="p-6 border-t border-gold/10"><label className="flex items-center gap-2 text-sm"><input type="checkbox" checked={gift} onChange={e=>setGift(e.target.checked)}/> Gift</label>{gift&&<textarea placeholder="Gift message" value={giftNote} onChange={e=>setGiftNote(e.target.value)} className="w-full p-2 border border-gold/20 rounded-xl mt-2 text-sm"/>}<div className="mt-4 flex gap-2"><input placeholder="Discount code" value={discountCode} onChange={e=>setDiscountCode(e.target.value)} className="flex-1 p-2 border border-gold/20 rounded-xl text-sm"/><button onClick={applyDiscount} className="px-4 py-2 bg-gold text-base rounded-xl text-sm">Apply</button></div>{discountError&&<p className="text-rose text-xs mt-1">{discountError}</p>}{appliedDiscount>0&&<p className="text-sage text-xs mt-1">Discount {appliedDiscount}% applied!</p>}<div className="flex justify-between mt-4"><span>Subtotal</span><span className="font-bold">₹{cartTotal.toLocaleString('en-IN')}</span></div>{appliedDiscount>0&&<div className="flex justify-between"><span>Discount ({appliedDiscount}%)</span><span className="text-sage">-₹{((cartTotal*appliedDiscount)/100).toLocaleString('en-IN')}</span></div>}<div className="flex justify-between mt-2"><span>Total</span><span className="font-bold">₹{discountedTotal.toLocaleString('en-IN')}</span></div><button onClick={()=>{setCartOpen(false);setCheckoutStep('review');}} className="w-full py-4 btn-primary rounded-2xl mt-4">Checkout</button></div></div></div>}
      {checkoutStep==='review'&&<div className="fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm"><div className="bg-base rounded-3xl max-w-lg w-full shadow-2xl animate-scale-in p-8"><h2 className="font-display text-2xl font-bold mb-4">Review</h2>{cart.map((i,idx)=><div key={idx} className="flex justify-between py-2"><span>{i.productName} x{i.quantity}</span><span>₹{(i.price*i.quantity).toLocaleString('en-IN')}</span></div>)}<div className="flex justify-between mt-4 font-bold"><span>Total</span><span>₹{discountedTotal.toLocaleString('en-IN')}</span></div><div className="flex gap-3 mt-6"><button onClick={()=>setCheckoutStep(null)} className="flex-1 py-3 border border-gold/30 rounded-xl">Cancel</button><button onClick={()=>setCheckoutStep('form')} className="flex-1 py-3 bg-rose text-base rounded-xl">Continue</button></div></div></div>}
      {checkoutStep==='form'&&<CheckoutForm cart={cart} onPlaceOrder={(customer)=>{ setCustomerForm(customer); placeOrder(customer); }} onBack={()=>setCheckoutStep('review')}/>}
      {wishOpen&&<div className="fixed inset-0 z-50 flex"><div className="fixed inset-0 bg-ink/30 backdrop-blur-sm" onClick={()=>setWishOpen(false)}></div><div className="fixed top-0 right-0 h-full w-full max-w-sm bg-base shadow-2xl flex flex-col"><div className="p-6 border-b border-gold/10 flex justify-between"><h2 className="font-display text-xl font-bold">Wishlist</h2><button onClick={()=>setWishOpen(false)} aria-label="Close wishlist"><svg width="20" height="20" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div className="flex-1 overflow-y-auto p-6 space-y-4">{wishlist.map((item,i)=><div key={i} className="glass-card p-4"><p className="font-semibold">{item.productName}</p><p className="text-xs text-muted">{item.color} · {item.pattern} · {item.sizeName}</p><div className="flex gap-2 mt-2"><button onClick={()=>moveWishToCart(i)} className="text-xs bg-gold/20 text-gold px-3 py-1 rounded-full">Move to Cart</button><button onClick={()=>setWishlist(wishlist.filter((_,idx)=>idx!==i))} className="text-xs text-rose">Remove</button></div></div>)}</div></div></div>}
      <ProductDetailModal product={detailProduct} onClose={()=>setDetailProduct(null)} onCustomize={(p)=>{selectProduct(p);setDetailProduct(null);}} onNotify={handleNotify} />
      <OrderTrackingModal isOpen={trackOpen} onClose={()=>setTrackOpen(false)} orders={orders} />
