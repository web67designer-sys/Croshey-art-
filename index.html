<body class="bg-base text-ink antialiased">
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, memo, useCallback } = React;

// ══════════════════════════════════════════════════════════════
// CONFIG — paste your keys here to go LIVE (see README "Go live")
// Leave blank to run in local demo mode (saves to this browser only).
// ══════════════════════════════════════════════════════════════
const CONFIG = {
  SUPABASE_URL: '',          // e.g. https://abcd1234.supabase.co
  SUPABASE_ANON_KEY: '',     // your project's anon/public key
  RAZORPAY_KEY_ID: '',       // e.g. rzp_test_xxxxxxxx  (Razorpay Key ID)
  RAZORPAY_ENABLED: false,   // set true once RAZORPAY_KEY_ID is filled
  BUSINESS_NAME: 'Looped & Lovely',
  // AI image->3D: a Supabase Edge Function named "image-to-3d" that calls Meshy
  // with your SECRET key (kept server-side). Leave blank to disable AI generation.
  IMAGE_TO_3D_FN: '',        // e.g. https://YOURPROJECT.supabase.co/functions/v1/image-to-3d
};

// Supabase client (null in demo mode)
const supa = (CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY)
  : null;
const LIVE = !!supa;

// ── DB ADAPTER ────────────────────────────────────────────────
// Uses Supabase when configured; otherwise falls back to localStorage so the
// site keeps working as a demo. Same async API either way.
const lsGet = (k,d)=>{ try{const v=JSON.parse(localStorage.getItem(k)); return v==null?d:v;}catch(e){return d;} };
const lsSet = (k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} };

const db = {
  live: LIVE,
  // ORDERS
  async getOrders(){
    if(!supa) return lsGet('ll_orders',[]);
    const { data, error } = await supa.from('orders').select('*').order('created_at',{ascending:true});
    if(error){ console.warn('Supabase getOrders',error.message); return []; }
    return (data||[]).map(r=>({ id:r.order_id, date:r.date, customer:r.customer, items:r.items, gift:r.gift, giftNote:r.gift_note, discount:r.discount, total:r.total, status:r.status, payment:r.payment }));
  },
  async addOrder(o){
    if(!supa){ const all=lsGet('ll_orders',[]); all.push(o); lsSet('ll_orders',all); return o; }
    const row={ order_id:o.id, date:o.date, customer:o.customer, items:o.items, gift:o.gift, gift_note:o.giftNote, discount:o.discount, total:o.total, status:o.status, payment:o.payment||null };
    const { error } = await supa.from('orders').insert(row);
    if(error){ console.warn('Supabase addOrder',error.message); throw error; }
    return o;
  },
  async updateOrderStatus(id,status){
    if(!supa){ const all=lsGet('ll_orders',[]).map(o=>o.id===id?{...o,status}:o); lsSet('ll_orders',all); return; }
    await supa.from('orders').update({status}).eq('order_id',id);
  },
  // PRODUCTS
  async getProducts(){
    if(!supa) return lsGet('ll_products', null) || PRODUCTS;
    const { data, error } = await supa.from('products').select('*').order('id',{ascending:true});
    if(error || !data || !data.length){ return PRODUCTS; } // fall back to seed if table empty
    return data.map(r=>({ ...r.data, id:r.id, inStock:r.in_stock, basePrice:r.base_price }));
  },
  async saveProducts(list){
    lsSet('ll_products',list); // always cache locally
    if(!supa) return;
    const rows=list.map(p=>({ id:p.id, base_price:p.basePrice, in_stock:p.inStock, data:p }));

  async addNotif(n){

// Opens Razorpay checkout. Resolves with payment info on success.
// NOTE: For production you should VERIFY the payment signature on a server
// (e.g. a Supabase Edge Function). This client flow is the standard first step.
function payWithRazorpay({ amount, customer }){
  return new Promise((resolve,reject)=>{
    if(!CONFIG.RAZORPAY_ENABLED || !CONFIG.RAZORPAY_KEY_ID || !window.Razorpay){
      // No payment configured -> treat as "pay on delivery / contact" (demo)
      return resolve({ method:'manual', paid:false, id:'NO-PAYMENT' });
    }
    const rzp = new window.Razorpay({
      key: CONFIG.RAZORPAY_KEY_ID,
      amount: Math.round(amount*100), // paise
      currency: 'INR',
      name: CONFIG.BUSINESS_NAME,
      description: 'Handmade crochet order',
      prefill: { name: customer.name, email: customer.email, contact: customer.phone },
      theme: { color: '#B5552F' },
      handler: (resp)=> resolve({ method:'razorpay', paid:true, id: resp.razorpay_payment_id }),
      modal: { ondismiss: ()=> reject(new Error('Payment cancelled')) },
    });
    rzp.open();
  });
}

// ── AI IMAGE → 3D (via Supabase Edge Function calling Meshy) ──
// Sends an image (data URL or URL) to your Edge Function, polls until the .glb
// is ready, returns the model URL. The secret Meshy key stays on the server.
async function generate3DFromImage(imageDataUrl, onProgress){
  if(!CONFIG.IMAGE_TO_3D_FN) throw new Error('AI 3D generation is not configured (set CONFIG.IMAGE_TO_3D_FN).');
  const headers={'Content-Type':'application/json'};
  if(CONFIG.SUPABASE_ANON_KEY){ headers['Authorization']='Bearer '+CONFIG.SUPABASE_ANON_KEY; headers['apikey']=CONFIG.SUPABASE_ANON_KEY; }
  // 1) start the job
  onProgress&&onProgress('Starting…');
  const startRes=await fetch(CONFIG.IMAGE_TO_3D_FN,{method:'POST',headers,body:JSON.stringify({action:'create',image:imageDataUrl})});
  if(!startRes.ok) throw new Error('Generation failed to start ('+startRes.status+')');
  const started=await startRes.json();
  if(started.glbUrl) return started.glbUrl; // function may return directly
  const taskId=started.taskId||started.id; if(!taskId) throw new Error('No task id returned');
  // 2) poll
  for(let i=0;i<60;i++){
    await new Promise(r=>setTimeout(r,5000));
    onProgress&&onProgress('Generating 3D… '+Math.min(95,i*5)+'%');
    const pr=await fetch(CONFIG.IMAGE_TO_3D_FN,{method:'POST',headers,body:JSON.stringify({action:'status',taskId})});
    if(!pr.ok) continue;
    const st=await pr.json();
    if(st.status==='SUCCEEDED'||st.glbUrl){ onProgress&&onProgress('Done'); return st.glbUrl||st.model_urls?.glb; }
    if(st.status==='FAILED') throw new Error('Generation failed');
  }
  throw new Error('Timed out — try again later');
}

// Derive the colourable parts list from a product (custom geometry first, else preset).
function partsForProduct(p){
  if(p && p.glbUrl){ return [['top','Top'],['middle','Middle'],['bottom','Bottom']]; }
  if(p && Array.isArray(p.geometry) && p.geometry.length){
    const seen={}; const out=[];
    p.geometry.forEach(g=>{ const k=g.part||'body'; if(!seen[k]){ seen[k]=1; out.push([k, g.label||k]); } });
    return out.length?out:[['body','Colour']];
  }
  return partsFor(p?.model);
}
// Build a THREE.Group from a custom geometry spec (array of parts).
function buildFromSpec(spec, matFor, sm){
  const g=new THREE.Group(); const seg=36;
  spec.forEach(it=>{
    const s=(it.size||[1,1,1]).map(v=>(+v||0.01)*sm);
    let geo;
    switch(it.shape){
      case 'box': geo=new THREE.BoxGeometry(s[0],s[1],s[2],4,4,4); break;
      case 'cylinder': geo=new THREE.CylinderGeometry(s[0]*0.5,s[0]*0.5,s[1],seg); break;
      case 'cone': geo=new THREE.ConeGeometry(s[0]*0.5,s[1],seg); break;
      case 'torus': geo=new THREE.TorusGeometry(s[0]*0.5,Math.max(0.04,s[1]*0.25),16,seg); break;
      case 'capsule': geo=new THREE.CapsuleGeometry(s[0]*0.4,Math.max(0.05,s[1]),8,16); break;
      default: geo=new THREE.SphereGeometry(s[0]*0.5,seg,seg);
    }
    const m=new THREE.Mesh(geo, matFor(it.part||'body'));
    if(it.shape==='sphere'||it.shape==='box') m.scale.set((s[0]/ (it.shape==='sphere'?s[0]:1))||1,1,1);
    if(it.shape==='sphere'){ m.scale.set(1, (s[1]/s[0])||1, (s[2]/s[0])||1); }
    if(it.shape==='box'){ /* box already uses full dims */ }
    m.position.set(...(it.pos||[0,0,0]).map(v=>(+v||0)*sm));
    m.rotation.set(...(it.rot||[0,0,0]).map(v=>(+v||0)*Math.PI/180));
    m.castShadow=true; m.receiveShadow=true; m.userData.part=it.part||'body';
    g.add(m);
  });
  return g;
}

// ── COLOUR HELPERS + CROCHET TEXTURE ──────────────────────────
function hexToRgb(hex){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:{r:200,g:180,b:160};}
function makeYarnTexture(baseHex, pattern='solid', secHex=null){
  const c=document.createElement('canvas'); c.width=512; c.height=512; const ctx=c.getContext('2d');
  ctx.fillStyle=baseHex; ctx.fillRect(0,0,512,512);
  const b=hexToRgb(baseHex);
  const dark=`rgb(${Math.max(0,b.r-34)},${Math.max(0,b.g-34)},${Math.max(0,b.b-34)})`;
  const light=`rgb(${Math.min(255,b.r+28)},${Math.min(255,b.g+28)},${Math.min(255,b.b+28)})`;
  let sec=secHex; if(!sec||sec===baseHex) sec=`rgb(${Math.min(255,b.r+46)},${Math.min(255,b.g+46)},${Math.min(255,b.b+46)})`;
  const sz=18, sp=22;
  for(let y=0;y<512+sp;y+=sp){const ox=(Math.floor(y/sp)%2===0)?0:sp/2;
    for(let x=-sp;x<512+sp;x+=sp){const cx=x+ox, cy=y; let fill=dark;
      if(pattern==='striped') fill=Math.floor(cy/(sp*3))%2===0?dark:sec;
      else if(pattern==='speckled') fill=Math.random()>0.32?dark:sec;
      else if(pattern==='chevron'){const z=Math.sin(cx*0.03)*40; fill=(cy+z)%80<40?dark:sec;}
      // V-stitch look
      ctx.strokeStyle=fill; ctx.lineWidth=4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(cx-sz*0.4,cy-sz*0.4); ctx.lineTo(cx,cy+sz*0.3); ctx.lineTo(cx+sz*0.4,cy-sz*0.4); ctx.stroke();
      ctx.fillStyle=light; ctx.beginPath(); ctx.arc(cx,cy-1,sz*0.16,0,Math.PI*2); ctx.fill();
    }}
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.colorSpace=THREE.SRGBColorSpace; t.magFilter=THREE.LinearFilter; t.minFilter=THREE.LinearMipmapLinearFilter; t.userData={canvas:c};
  return t;
}

  const host = useRef(null);
  const sceneRef = useRef(null);
  const rot = useRef({x:0.18,y:0.6});

  const matsRef = useRef({}); // part -> material
  const glbMeshesRef = useRef(null); // {meshes, box} for loaded GLB
  const grpRef = useRef(null);
  const partColorsRef = useRef(partColors); partColorsRef.current = partColors;
  // Recolour a loaded GLB by vertical zones using partColors {top,middle,bottom}.
  function applyZoneColors(){
    const data=glbMeshesRef.current; if(!data) return;
    const pc=partColorsRef.current||{};
    const top=pc.top||pc.body||'#E8D5C0', mid=pc.middle||pc.body||top, bot=pc.bottom||pc.body||mid;
    const colTop=new THREE.Color(top), colMid=new THREE.Color(mid), colBot=new THREE.Color(bot);
    const box=data.box; const minY=box.min.y, h=(box.max.y-box.min.y)||1;
    data.meshes.forEach(m=>{
      const g=m.geometry; if(!g||!g.attributes||!g.attributes.position) return;
      const pos=g.attributes.position; const n=pos.count;
      const colors=new Float32Array(n*3);
      const v=new THREE.Vector3();
      for(let i=0;i<n;i++){
        v.fromBufferAttribute(pos,i); m.localToWorld(v); // approx world Y
        const t=(v.y-minY)/h; let c= t>0.66?colTop : t>0.33?colMid : colBot;
        colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;
      }
      g.setAttribute('color', new THREE.BufferAttribute(colors,3));
      if(!m.material || m.material.userData.zoned!==true){
        m.material=new THREE.MeshStandardMaterial({vertexColors:true, roughness:0.8, metalness:0.0});
        m.material.userData.zoned=true;
      } else { m.material.vertexColors=true; m.material.needsUpdate=true; }
    });
  }

  // build scene once per product/size/pattern
  useEffect(()=>{
    const el=host.current; if(!el||!window.THREE) return;
    const w=el.clientWidth||500, h=el.clientHeight||500;
    const scene=new THREE.Scene(); sceneRef.current=scene;
    const cam=new THREE.PerspectiveCamera(42,w/h,0.1,40); cam.position.set(0,0.4,5);
    const rend=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
    rend.setClearColor(0x000000,0); rend.setSize(w,h); rend.setPixelRatio(Math.min(window.devicePixelRatio,2));
    rend.shadowMap.enabled=true; rend.shadowMap.type=THREE.PCFSoftShadowMap; rend.toneMapping=THREE.ACESFilmicToneMapping; rend.toneMappingExposure=1.15;
    el.innerHTML=''; el.appendChild(rend.domElement);
    if(stageRef) stageRef.current=rend.domElement;
    scene.add(new THREE.AmbientLight('#fff3e6',2.6));
    const key=new THREE.DirectionalLight('#ffffff',3.4); key.position.set(4,7,5); key.castShadow=true; key.shadow.mapSize.set(1024,1024); key.shadow.bias=-0.0001; scene.add(key);
    const fill=new THREE.DirectionalLight('#ffd9b8',1.4); fill.position.set(-4,2,-2); scene.add(fill);
    const rim=new THREE.DirectionalLight('#e8c170',1.0); rim.position.set(0,3,-5); scene.add(rim);
    const shadow=new THREE.Mesh(new THREE.CircleGeometry(3.2,48), new THREE.ShadowMaterial({opacity:0.22})); shadow.rotation.x=-Math.PI/2; shadow.position.y=-1.7; shadow.receiveShadow=true; scene.add(shadow);

    // material per part
    matsRef.current={};
    const bump=makeYarnTexture('#808080',pattern,'#606060');
    const matFor=(part)=>{
      if(matsRef.current[part]) return matsRef.current[part];
      const col=(partColors&&partColors[part])||product.colors?.[0]||'#E8D5C0';
      const tex=makeYarnTexture(col,pattern);
      const m=new THREE.MeshStandardMaterial({map:tex,bumpMap:bump,bumpScale:0.07,roughness:0.78,metalness:0.0});
      m.userData.part=part; matsRef.current[part]=m; return m;
    };
    const sm=size?.mult?Math.cbrt(size.mult):1;
    let grp;
    glbMeshesRef.current=null;
    if(product.glbUrl && window.THREE && THREE.GLTFLoader){
      // AI / uploaded GLB: load async, recolour by vertical ZONES (top/middle/bottom)
      grp=new THREE.Group(); grp.scale.setScalar(sm); scene.add(grp);
      const loader=new THREE.GLTFLoader();

        const obj=gltf.scene;

        obj.position.sub(c); const maxd=Math.max(s.x,s.y,s.z)||1; obj.scale.setScalar(2.4/maxd);
        const meshes=[]; obj.traverse(m=>{ if(m.isMesh){ m.castShadow=true; m.receiveShadow=true; meshes.push(m); } });
        glbMeshesRef.current={ meshes, box:new THREE.Box3().setFromObject(obj) };
        applyZoneColors(); // initial paint
        grp.add(obj);
        if(onReady) onReady();
      }, undefined, ()=>{ if(onReady) onReady(); });
    } else {
      grp=buildModel(product.model,matFor,1.0,product); grp.scale.setScalar(sm); scene.add(grp);
      if(onReady) onReady();
    }
    grpRef.current=grp;

    const pos=(cx,cy)=>{const r=rend.domElement.getBoundingClientRect();return{x:((cx-r.left)/r.width)*2-1,y:-((cy-r.top)/r.height)*2+1};};
    const sd=(x,y)=>{drag.current=true;auto.current=false;last.current=Date.now();prev.current=pos(x,y);};
    const dd=(x,y)=>{if(!drag.current)return;last.current=Date.now();const p=pos(x,y);target.current.y+=(p.x-prev.current.x)*2.6;target.current.x+=(p.y-prev.current.y)*2.6;target.current.x=Math.max(-1.1,Math.min(1.1,target.current.x));prev.current=p;};
    const ed=()=>{drag.current=false;};
    const md=e=>sd(e.clientX,e.clientY), mm=e=>dd(e.clientX,e.clientY), mu=()=>ed();
    rend.domElement.addEventListener('mousedown',md); window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
    const ts=e=>{ if(e.touches.length===1) sd(e.touches[0].clientX,e.touches[0].clientY); else if(e.touches.length===2){drag.current=false;auto.current=false;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinch.current=Math.hypot(dx,dy);} };
    const tm=e=>{ last.current=Date.now(); if(e.touches.length===1&&drag.current){e.preventDefault();dd(e.touches[0].clientX,e.touches[0].clientY);} else if(e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.hypot(dx,dy);if(pinch.current){cam.position.z=Math.max(3,Math.min(8,cam.position.z*(pinch.current/d)));}pinch.current=d;} };
    const te=()=>{ed();pinch.current=0;};
    rend.domElement.addEventListener('touchstart',ts,{passive:false}); rend.domElement.addEventListener('touchmove',tm,{passive:false}); rend.domElement.addEventListener('touchend',te); rend.domElement.addEventListener('touchcancel',te);

    // view presets via viewRef
    if(viewRef) viewRef.current=(view)=>{ auto.current=false; last.current=Date.now()+99999;
      const map={front:{x:0.12,y:0},right:{x:0.12,y:Math.PI/2},back:{x:0.12,y:Math.PI},left:{x:0.12,y:-Math.PI/2},top:{x:1.0,y:0}};
      if(map[view]){ target.current.x=map[view].x; target.current.y=map[view].y; }
    };

    let scale=0;
    const loop=()=>{ raf.current=requestAnimationFrame(loop);
      const G=grpRef.current; if(!G){ rend.render(scene,cam); return; }
      if(scale<1){ scale=Math.min(1,scale+0.06); G.scale.setScalar(sm*scale*(2-scale)); }
      if(!drag.current&&Date.now()-last.current>3000) auto.current=true;
      if(auto.current&&!drag.current) target.current.y+=0.0045;
      rot.current.x += (target.current.x-rot.current.x)*0.12;
      rot.current.y += (target.current.y-rot.current.y)*0.12;
      G.rotation.y=rot.current.y; G.rotation.x=rot.current.x*0.5;
      rend.render(scene,cam);
    }; loop();
    const onR=()=>{ if(deb.current)clearTimeout(deb.current); deb.current=setTimeout(()=>{const w2=el.clientWidth,h2=el.clientHeight; if(w2&&h2){rend.setSize(w2,h2);cam.aspect=w2/h2;cam.updateProjectionMatrix();}},150); };
    window.addEventListener('resize',onR);
    return ()=>{ cancelAnimationFrame(raf.current); rend.domElement.removeEventListener('mousedown',md); window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); rend.domElement.removeEventListener('touchstart',ts); rend.domElement.removeEventListener('touchmove',tm); rend.domElement.removeEventListener('touchend',te); rend.domElement.removeEventListener('touchcancel',te); window.removeEventListener('resize',onR); if(deb.current)clearTimeout(deb.current); rend.dispose(); scene.traverse(o=>{if(o.geometry)o.geometry.dispose(); if(o.material){if(o.material.map)o.material.map.dispose(); if(o.material.bumpMap)o.material.bumpMap.dispose(); o.material.dispose();}}); };
  },[product?.id, product?.model, pattern, size?.name]);

  // live recolor parts WITHOUT rebuilding scene
  useEffect(()=>{
    if(glbMeshesRef.current){ applyZoneColors(); return; } // GLB: zone recolor
    const mats=matsRef.current; if(!mats) return;
    Object.entries(partColors||{}).forEach(([part,col])=>{
      const m=mats[part]; if(m&&col){ if(m.map)m.map.dispose(); m.map=makeYarnTexture(col,pattern); m.needsUpdate=true; }
    });
  },[partColors,pattern]);

  const bg = product.backdropImage ? `center/cover no-repeat url(${product.backdropImage})` : (BACKDROPS[product.backdrop]||BACKDROPS.cream);
  return <div ref={host} id="stage" className="w-full max-w-full h-[330px] sm:h-[420px] lg:h-[500px]" style={{ maxWidth:'100%', background:bg, borderRadius:'1.75rem', touchAction:'none' }}/>;
});

const Reveal = memo(({children, delay=0, className=''})=>{
  const ref=useRef(null); const [vis,setVis]=useState(false);
  useEffect(()=>{ const o=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)setVis(true);}),{threshold:0.12,rootMargin:'0px 0px -40px 0px'}); if(ref.current)o.observe(ref.current); return ()=>o.disconnect(); },[]);
  return <div ref={ref} className={`reveal ${vis?'in':''} ${className}`} style={{transitionDelay:`${delay}ms`}}>{children}</div>;
});

function useCountUp(end, dur=1400){ const [n,setN]=useState(0); useEffect(()=>{ if(end<=0){setN(0);return;} let s=null,id; const step=t=>{ if(!s)s=t; const p=Math.min((t-s)/dur,1); setN(Math.floor(p*end)); if(p<1)id=requestAnimationFrame(step); }; id=requestAnimationFrame(step); return ()=>cancelAnimationFrame(id); },[end,dur]); return n; }
// Close an open modal/drawer with the Escape key (accessibility).
function useEscClose(isOpen, onClose){
  useEffect(()=>{ if(!isOpen) return; const h=(e)=>{ if(e.key==='Escape') onClose&&onClose(); }; window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); },[isOpen,onClose]);
}

function Stats(){
  const ref=useRef(null); const [go,setGo]=useState(false);
  useEffect(()=>{const o=new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&setGo(true)),{threshold:0.3});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);
  const data=[['12,400','Pieces stitched'],['4.9','Avg. rating'],['38','Countries shipped'],['100%','Made to order']];
  const A=({v})=>{const num=parseFloat(v.replace(/,/g,'')); const c=useCountUp(go?num:0, 1400); const isFloat=v.includes('.'); const disp=isFloat?(c/1).toFixed(0):c.toLocaleString('en-IN'); return <span>{go?(isFloat?v:disp+(v.includes('%')?'%':v.includes(',')||num>=1000?'+':'')):'0'}</span>;};
  return (
    <section ref={ref} className="py-12 px-5">
      <div className="max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
        {data.map((d,i)=><Reveal key={i} delay={i*90}><div><p className="font-display text-4xl md:text-5xl font-semibold text-clay">{i===1?'4.9':<A v={d[0]}/>}</p><p className="text-sm text-muted mt-1">{d[1]}</p></div></Reveal>)}

}

  const ref=useRef(null); const viewRef=useRef(null); const [loading,setLoading]=useState(true);

          </div>
          {/* View presets (left / front / right / back) */}

            {views.map(([k,l])=><button key={k} onClick={()=>viewRef.current&&viewRef.current(k)} className="btn btn-ghost text-xs px-4 py-1.5" aria-label={`View ${l.toLowerCase()} side`}>{l} view</button>)}
          </div>

          <p className="text-xs text-center text-muted flex items-center justify-center gap-1.5"><span className="text-sage">●</span> Ethically handcrafted · Est. delivery <Delivery/></p>
        </div>
      </div>
    </section>
  );

// Assemble a custom 3D geometry from primitive parts, with a live preview.
function ShapeMini({ spec }){
  const host=useRef(null), raf=useRef(null);
  useEffect(()=>{
    const el=host.current; if(!el||!window.THREE) return;
    const w=el.clientWidth||260,h=220;
    const scene=new THREE.Scene();
    const cam=new THREE.PerspectiveCamera(45,w/h,0.1,40); cam.position.set(0,0.6,6);
    const rend=new THREE.WebGLRenderer({antialias:true,alpha:true}); rend.setSize(w,h); rend.setPixelRatio(Math.min(window.devicePixelRatio,2));
    el.innerHTML=''; el.appendChild(rend.domElement);
    scene.add(new THREE.AmbientLight('#ffffff',2.2));
    const key=new THREE.DirectionalLight('#ffffff',2.4); key.position.set(4,6,5); scene.add(key);
    const palette=['#C26B4A','#E8C170','#84956F','#7A4E5E','#9FB7C9','#D98C8C'];
    const groups={}; let gi=0;
    const matFor=(part)=>{ if(!groups[part]){ groups[part]=new THREE.MeshStandardMaterial({color:palette[gi%palette.length],roughness:0.7}); gi++; } return groups[part]; };
    let grp;
    try{ grp=buildFromSpec(spec&&spec.length?spec:[blankGeoPart()], matFor, 1); }catch(e){ grp=new THREE.Group(); }
    // center + fit
    const box=new THREE.Box3().setFromObject(grp); const c=box.getCenter(new THREE.Vector3()); grp.position.sub(c);
    const sz=box.getSize(new THREE.Vector3()); const maxd=Math.max(sz.x,sz.y,sz.z)||2; cam.position.set(0,0.4,maxd*2.2+1.5);
    scene.add(grp);
    let t=0; const loop=()=>{ raf.current=requestAnimationFrame(loop); t+=0.012; grp.rotation.y=t; rend.render(scene,cam); }; loop();
    return ()=>{ cancelAnimationFrame(raf.current); rend.dispose(); scene.traverse(o=>{o.geometry&&o.geometry.dispose(); o.material&&o.material.dispose&&o.material.dispose();}); };
  },[JSON.stringify(spec)]);
  return <div ref={host} className="w-full rounded-xl overflow-hidden" style={{height:'220px',background:'radial-gradient(circle at 50% 30%,#3a2a1c,#1a120c)'}}/>;
}

function ShapeBuilder({ value, onChange }){
  const spec = Array.isArray(value)&&value.length ? value : [];
  const set=(next)=>onChange(next.length?next:null);
  const upd=(i,patch)=>{ const n=spec.map((p,j)=>j===i?{...p,...patch}:p); set(n); };
  const updNum=(i,key,idx,v)=>{ const arr=[...(spec[i][key]||[0,0,0])]; arr[idx]=v===''?'':parseFloat(v); upd(i,{[key]:arr}); };
  const add=()=>set([...spec, blankGeoPart()]);
  const dup=(i)=>set([...spec.slice(0,i+1), {...spec[i]}, ...spec.slice(i+1)]);
  const del=(i)=>set(spec.filter((_,j)=>j!==i));
  const NumRow=({i,label,k})=>(
    <div className="flex items-center gap-1.5">
      <span className="text-[10px] text-cream/40 w-7">{label}</span>
      {[0,1,2].map(ax=><input key={ax} type="number" step="0.1" value={(spec[i][k]||[0,0,0])[ax]} onChange={e=>updNum(i,k,ax,e.target.value)} className="w-full p-1 bg-obsidian border border-honey/20 rounded text-cream text-xs"/>)}
    </div>
  );
  return (
    <div className="border border-honey/15 rounded-xl p-3 space-y-3">
      <div className="flex items-center justify-between">
        <p className="text-xs text-cream/60 font-medium">3D Shape Builder {spec.length?`(${spec.length} parts)`:''}</p>
        {spec.length>0 && <button type="button" onClick={()=>set([])} className="text-[11px] text-clay-light hover:underline">Clear (use preset)</button>}
      </div>
      {spec.length===0
        ? <div className="text-center py-4"><p className="text-xs text-cream/40 mb-2">No custom shape — this product uses the preset model dropdown above.</p><button type="button" onClick={add} className="btn btn-primary px-4 py-2 text-sm">Build a custom 3D shape</button></div>
        : <>
          <ShapeMini spec={spec}/>
          <div className="space-y-2 max-h-52 overflow-y-auto pr-1">
            {spec.map((it,i)=>(
              <div key={i} className="bg-obsidian/60 border border-honey/10 rounded-lg p-2.5 space-y-1.5">
                <div className="flex gap-2">
                  <select value={it.shape} onChange={e=>upd(i,{shape:e.target.value})} className="p-1.5 bg-obsidian border border-honey/20 rounded text-cream text-xs flex-1">{SHAPE_TYPES.map(s=><option key={s}>{s}</option>)}</select>
                  <input value={it.label||''} onChange={e=>upd(i,{label:e.target.value})} placeholder="Label" className="p-1.5 bg-obsidian border border-honey/20 rounded text-cream text-xs w-24"/>
                  <input value={it.part||''} onChange={e=>upd(i,{part:e.target.value.toLowerCase().replace(/[^a-z0-9]/g,'')})} placeholder="colour-group" title="Parts sharing this id are coloured together" className="p-1.5 bg-obsidian border border-honey/20 rounded text-cream text-xs w-24"/>
                </div>
                <NumRow i={i} label="size" k="size"/>
                <NumRow i={i} label="pos" k="pos"/>
                <NumRow i={i} label="rot°" k="rot"/>
                <div className="flex gap-3 text-[11px]"><button type="button" onClick={()=>dup(i)} className="text-honey hover:underline">Duplicate</button><button type="button" onClick={()=>del(i)} className="text-danger hover:underline">Remove</button></div>
              </div>
            ))}
          </div>
          <button type="button" onClick={add} className="w-full text-xs bg-honey/10 text-honey px-3 py-2 rounded-lg hover:bg-honey/20">+ Add part</button>
          <p className="text-[10px] text-cream/40">Tip: parts with the same <b>colour-group</b> recolour together. size = width/height/depth, pos = x/y/z position, rot = degrees.</p>
        </>}
    </div>
  );
}

            <span className="font-display text-xl font-semibold text-honey">Looped <span className="text-cream/70">Admin</span></span>
            <button onClick={()=>setMenuOpen(false)} className="text-cream/60 hover:text-cream" aria-label="Close menu">{Ic.close()}</button>
          </div>

          <div className="p-4 border-t border-honey/10 space-y-2">
            <label className="w-full text-sm bg-honey/10 text-honey px-4 py-2.5 rounded-xl cursor-pointer hover:bg-honey/20 block text-center"><input type="file" accept=".json" onChange={importProducts} className="hidden"/>Import products</label>

            <button onClick={onLogout} className="w-full text-sm text-cream/50 hover:text-honey px-4 py-2.5">Log out</button>

      </div>}

          </div>
          <div className="flex gap-2 items-center">
            <span className="hidden sm:inline font-display text-honey font-semibold text-sm">Looped Admin</span>
            <button onClick={onLogout} className="text-xs text-cream/50 px-2 hover:text-honey">Exit</button>
          </div>
        </header>
        <div className="flex-1 overflow-y-auto p-5 md:p-8">
          {tab==='dash'&&<div className="space-y-6">
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
              <Stat l="Revenue" v={'₹'+aRev.toLocaleString('en-IN')} sub={orders.length+' orders'}/>
              <Stat l="Orders" v={aOrd} sub={processing+' processing'}/>
              <Stat l="Avg order" v={'₹'+aAvg.toLocaleString('en-IN')}/>
              <Stat l="Top product" v={<span className="text-lg">{topProduct}</span>}/>
            </div>
            <div className="bg-charcoal border border-honey/10 rounded-2xl p-5">
              <h3 className="font-display text-lg font-semibold mb-3">Sales · last 7 days</h3>
              <canvas ref={chartRef} className="w-full" style={{height:'170px'}}/>
              {orders.length===0&&<p className="text-center text-cream/40 text-sm -mt-20 pb-16">No sales yet — your chart will fill in as orders arrive.</p>}
            </div>
            <div className="bg-charcoal border border-honey/10 rounded-2xl p-5">
              <h3 className="font-display text-lg font-semibold mb-3">Recent orders</h3>
              {orders.length===0?<p className="text-cream/40 text-sm">No orders yet.</p>:<div className="space-y-2">{orders.slice().reverse().slice(0,5).map((o,i)=><div key={i} className="flex justify-between items-center text-sm border-b border-honey/5 pb-2"><span className="font-mono text-honey">{o.id}</span><span className="text-cream/70">{o.customer.name}</span><span>₹{Math.round(o.total).toLocaleString('en-IN')}</span><span className="text-xs text-cream/50">{o.status}</span></div>)}</div>}
            </div>
          </div>}

          {tab==='products'&&<div>
            <div className="flex flex-col sm:flex-row gap-3 mb-5 sm:items-center justify-between">
              <h2 className="font-display text-xl font-semibold">Products ({fProducts.length})</h2>
              <div className="flex gap-2 flex-wrap">
                <input placeholder="Search…" value={pSearch} onChange={e=>setPSearch(e.target.value)} className="px-3 py-2 bg-charcoal border border-honey/20 rounded-lg text-sm text-cream w-36"/>
                <select value={pCat} onChange={e=>setPCat(e.target.value)} className="px-3 py-2 bg-charcoal border border-honey/20 rounded-lg text-sm text-cream">{['All','Toys','Accessories','Bags','Home'].map(c=><option key={c}>{c}</option>)}</select>

            </div>
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">{fProducts.map(p=><div key={p.id} className="bg-charcoal border border-honey/10 rounded-xl p-4">

          </div>}

          {tab==='customers'&&<div>
            <h2 className="font-display text-xl font-semibold mb-5">Customers ({customers.length})</h2>
            <div className="bg-charcoal border border-honey/10 rounded-xl overflow-x-auto"><table className="w-full text-sm min-w-[480px]"><thead className="text-cream/40 border-b border-honey/10"><tr><th className="text-left p-3">Name</th><th className="text-left p-3">Email</th><th className="text-center p-3">Orders</th><th className="text-right p-3">Spent</th></tr></thead><tbody>{customers.map((c,i)=><tr key={i} className="border-t border-honey/5 hover:bg-cream/5"><td className="p-3">{c.name}</td><td className="p-3 text-cream/60">{c.email}</td><td className="p-3 text-center text-honey">{c.orders}</td><td className="p-3 text-right">₹{Math.round(c.spent).toLocaleString('en-IN')}</td></tr>)}{customers.length===0&&<tr><td colSpan="4" className="p-6 text-center text-cream/40">No customers yet</td></tr>}</tbody></table></div>
          </div>}

          {tab==='notifications'&&<div>

          </div>}

          {tab==='discounts'&&<div>
            <h2 className="font-display text-xl font-semibold mb-5">Discount codes</h2>
            <div className="flex gap-2 mb-4 max-w-md"><input placeholder="CODE" value={dc} onChange={e=>setDc(e.target.value)} className="flex-1 px-3 py-2 bg-charcoal border border-honey/20 rounded-lg text-cream text-sm"/><input type="number" placeholder="%" value={dp} onChange={e=>setDp(e.target.value)} className="w-20 px-3 py-2 bg-charcoal border border-honey/20 rounded-lg text-cream text-sm"/><button onClick={addDiscount} className="btn btn-primary px-4 py-2 text-sm">Add</button></div>

          </div>}

          {tab==='settings'&&<div className="max-w-lg space-y-5">
            <h2 className="font-display text-xl font-semibold">Site settings</h2>
            <div className="bg-charcoal border border-honey/10 rounded-2xl p-5">
              <h3 className="font-medium mb-2">Story image</h3>
              <div className="flex gap-4 items-start">
                <div className="flex-1 space-y-2"><input value={setImg} onChange={e=>setSetImg(e.target.value)} className={inp} placeholder="Image URL"/><label className="text-xs bg-honey/10 text-honey px-3 py-1.5 rounded-lg cursor-pointer inline-block">Upload<input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setSetImg(ev.target.result);r.readAsDataURL(f);}} className="hidden"/></label></div>
                {setImg&&<img src={setImg} alt="" className="w-20 h-20 rounded-lg object-cover border border-honey/20"/>}
              </div>
              <button onClick={()=>{setSettings({...settings,catImage:setImg});alert('Saved — refresh to see it on the site.');}} className="btn btn-primary px-5 py-2 text-sm mt-4">Save settings</button>
            </div>
            <div className="bg-charcoal border border-honey/10 rounded-2xl p-5">
              <h3 className="font-medium mb-2">Reset</h3>
              <button onClick={()=>{if(confirm('Reset all products to defaults?')){persist(PRODUCTS);alert('Products reset.');}}} className="text-sm text-clay-light hover:underline">Reset products to defaults</button>
            </div>
          </div>}
        </div>
      </div>

      {showAdd&&<div className="fixed inset-0 z-[80] bg-obsidian/80 backdrop-blur flex items-center justify-center p-4" onClick={()=>setShowAdd(false)}><div className="bg-obsidian border border-honey/20 rounded-2xl p-6 w-full max-w-lg max-h-[88vh] overflow-y-auto space-y-3" onClick={e=>e.stopPropagation()}>
        <h3 className="font-display text-lg font-semibold">New product</h3>
        <input placeholder="Name" value={np.name} onChange={e=>setNp({...np,name:e.target.value})} className={inp}/>
        <div className="grid grid-cols-2 gap-2"><select value={np.category} onChange={e=>setNp({...np,category:e.target.value})} className={inp}>{['Toys','Accessories','Bags','Home'].map(c=><option key={c}>{c}</option>)}</select><select value={np.model} onChange={e=>setNp({...np,model:e.target.value})} className={inp} title="Preset shape (used if no custom shape is built)">{['bunny','beanie','bag','coaster','blanket','earrings','hanger'].map(m=><option key={m}>{m}</option>)}</select></div>
        <ShapeBuilder value={np.geometry} onChange={g=>setNp({...np,geometry:g})}/>
        <Model3DSource obj={np} set={setNp}/>
        <input type="number" placeholder="Base price" value={np.basePrice} onChange={e=>setNp({...np,basePrice:e.target.value})} className={inp}/>
        <textarea placeholder="Description" value={np.description} onChange={e=>setNp({...np,description:e.target.value})} className={inp} rows="2"/>
        <div className="flex flex-col gap-2">
          <label className="text-xs text-cream/50">Product image — <b className="text-honey">transparent PNG</b> only</label>
          <div className="flex items-center gap-3">
            <label className="text-xs bg-honey/10 text-honey px-3 py-2 rounded-lg cursor-pointer text-center">Upload PNG<input type="file" accept="image/png" onChange={e=>upload(e,setNp,np)} className="hidden"/></label>
            {np.image&&<img src={np.image} alt="" className="w-16 h-16 rounded-lg object-contain bg-[conic-gradient(#0000_90deg,#ffffff14_0_180deg,#0000_0_270deg,#ffffff14_0)] bg-[length:12px_12px]"/>}
          </div>
        </div>
        <div className="flex flex-col gap-2">
          <label className="text-xs text-cream/50">Custom backdrop (shown behind the product in the studio)</label>
          <div className="flex flex-wrap gap-2">{Object.keys(BACKDROPS).map(b=><button key={b} onClick={()=>setNp({...np,backdrop:b,backdropImage:''})} className={`w-8 h-8 rounded-lg border-2 ${np.backdrop===b&&!np.backdropImage?'border-honey':'border-transparent'}`} style={{background:BACKDROPS[b]}} title={b}/>)}
            <label className={`w-8 h-8 rounded-lg border-2 ${np.backdropImage?'border-honey':'border-honey/30'} flex items-center justify-center cursor-pointer text-honey text-xs`} title="Upload backdrop">+<input type="file" accept="image/*" onChange={e=>uploadBg(e,setNp,np)} className="hidden"/></label>
          </div>
        </div>
        <input placeholder="Colours (comma separated hex)" value={np.colors} onChange={e=>setNp({...np,colors:e.target.value})} className={inp}/>
        <input placeholder="Patterns (comma: solid,striped,…)" value={np.patterns} onChange={e=>setNp({...np,patterns:e.target.value})} className={inp}/>
        <textarea placeholder="Sizes JSON" value={np.sizes} onChange={e=>setNp({...np,sizes:e.target.value})} className={inp} rows="2"/>
        <div className="grid grid-cols-2 gap-2"><input placeholder="Material" value={np.material} onChange={e=>setNp({...np,material:e.target.value})} className={inp}/><input placeholder="Care" value={np.care} onChange={e=>setNp({...np,care:e.target.value})} className={inp}/><input placeholder="Weight" value={np.weight} onChange={e=>setNp({...np,weight:e.target.value})} className={inp}/><input placeholder="Hook" value={np.hook} onChange={e=>setNp({...np,hook:e.target.value})} className={inp}/></div>
        <input placeholder="Yarn brand" value={np.yarnBrand} onChange={e=>setNp({...np,yarnBrand:e.target.value})} className={inp}/>
        <div className="flex gap-3 pt-1"><button onClick={()=>setShowAdd(false)} className="btn btn-ghost flex-1 py-2.5 text-cream">Cancel</button><button onClick={addProduct} className="btn btn-primary flex-1 py-2.5">Create</button></div>
      </div></div>}

      {editing&&<div className="fixed inset-0 z-[80] bg-obsidian/80 backdrop-blur flex items-center justify-center p-4" onClick={()=>setEditing(null)}><div className="bg-obsidian border border-honey/20 rounded-2xl p-6 w-full max-w-lg max-h-[88vh] overflow-y-auto space-y-3" onClick={e=>e.stopPropagation()}>
        <h3 className="font-display text-lg font-semibold">Edit {editing.name}</h3>
        <input value={editing.name} onChange={e=>setEditing({...editing,name:e.target.value})} className={inp}/>
        <div className="grid grid-cols-2 gap-2"><select value={editing.category} onChange={e=>setEditing({...editing,category:e.target.value})} className={inp}>{['Toys','Accessories','Bags','Home'].map(c=><option key={c}>{c}</option>)}</select><select value={editing.model} onChange={e=>setEditing({...editing,model:e.target.value})} className={inp} title="Preset shape (used if no custom shape is built)">{['bunny','beanie','bag','coaster','blanket','earrings','hanger'].map(m=><option key={m}>{m}</option>)}</select></div>
        <ShapeBuilder value={editing.geometry} onChange={g=>setEditing({...editing,geometry:g})}/>
        <Model3DSource obj={editing} set={setEditing}/>
        <input type="number" value={editing.basePrice} onChange={e=>setEditing({...editing,basePrice:e.target.value})} className={inp}/>
        <textarea value={editing.description} onChange={e=>setEditing({...editing,description:e.target.value})} className={inp} rows="2"/>
        <div className="flex flex-col gap-2">
          <label className="text-xs text-cream/50">Product image — <b className="text-honey">transparent PNG</b> only</label>
          <div className="flex items-center gap-3">
            <label className="text-xs bg-honey/10 text-honey px-3 py-2 rounded-lg cursor-pointer text-center">Upload PNG<input type="file" accept="image/png" onChange={e=>upload(e,setEditing,editing)} className="hidden"/></label>
            {editing.image&&<img src={editing.image} alt="" className="w-16 h-16 rounded-lg object-contain bg-[conic-gradient(#0000_90deg,#ffffff14_0_180deg,#0000_0_270deg,#ffffff14_0)] bg-[length:12px_12px]"/>}
          </div>
        </div>
        <div className="flex flex-col gap-2">
          <label className="text-xs text-cream/50">Custom backdrop</label>
          <div className="flex flex-wrap gap-2">{Object.keys(BACKDROPS).map(b=><button key={b} onClick={()=>setEditing({...editing,backdrop:b,backdropImage:''})} className={`w-8 h-8 rounded-lg border-2 ${editing.backdrop===b&&!editing.backdropImage?'border-honey':'border-transparent'}`} style={{background:BACKDROPS[b]}} title={b}/>)}
            <label className={`w-8 h-8 rounded-lg border-2 ${editing.backdropImage?'border-honey':'border-honey/30'} flex items-center justify-center cursor-pointer text-honey text-xs`} title="Upload backdrop">+<input type="file" accept="image/*" onChange={e=>uploadBg(e,setEditing,editing)} className="hidden"/></label>
          </div>
        </div>
        <input value={editing.colors} onChange={e=>setEditing({...editing,colors:e.target.value})} className={inp} placeholder="Colours (comma)"/>
        <input value={editing.patterns} onChange={e=>setEditing({...editing,patterns:e.target.value})} className={inp} placeholder="Patterns (comma)"/>
        <textarea value={editing.sizes} onChange={e=>setEditing({...editing,sizes:e.target.value})} className={inp} rows="2" placeholder="Sizes JSON"/>
        <div className="grid grid-cols-2 gap-2"><input value={editing.material||''} onChange={e=>setEditing({...editing,material:e.target.value})} className={inp} placeholder="Material"/><input value={editing.care||''} onChange={e=>setEditing({...editing,care:e.target.value})} className={inp} placeholder="Care"/><input value={editing.weight||''} onChange={e=>setEditing({...editing,weight:e.target.value})} className={inp} placeholder="Weight"/><input value={editing.hook||''} onChange={e=>setEditing({...editing,hook:e.target.value})} className={inp} placeholder="Hook"/></div>
        <input value={editing.yarnBrand||''} onChange={e=>setEditing({...editing,yarnBrand:e.target.value})} className={inp} placeholder="Yarn brand"/>
        <div className="flex gap-3 pt-1"><button onClick={()=>setEditing(null)} className="btn btn-ghost flex-1 py-2.5 text-cream">Cancel</button><button onClick={saveEdit} className="btn btn-primary flex-1 py-2.5">Save changes</button></div>
      </div></div>}
    </div>
  );
}

// MAIN APP
// ══════════════════════════════════════════════════════════════
function App(){
  const [loading,setLoading]=useState(true);
  const [heroVis,setHeroVis]=useState(false);
  const [products,setProducts]=useState(()=>JSON.parse(localStorage.getItem('ll_products'))||PRODUCTS);
  const [orders,setOrders]=useState(()=>JSON.parse(localStorage.getItem('ll_orders'))||[]);
  const [settings,setSettings]=useState(()=>JSON.parse(localStorage.getItem('ll_settings'))||SETTINGS_DEFAULT);
  const [discounts,setDiscounts]=useState(()=>JSON.parse(localStorage.getItem('ll_discounts'))||DISCOUNTS);
  const [notifications,setNotifications]=useState(()=>JSON.parse(localStorage.getItem('ll_notifs'))||[]);
  const [selected,setSelected]=useState(products[0]);
  const [color,setColor]=useState(products[0].colors[0]);
  const [pattern,setPattern]=useState(products[0].patterns[0]);
  const [size,setSize]=useState(products[0].sizes[0]);
  const [partColors,setPartColors]=useState(()=>{const init={};partsForProduct(products[0]).forEach(([k])=>init[k]=products[0].colors[0]);return init;});
  const [cart,setCart]=useState(()=>JSON.parse(localStorage.getItem('ll_cart'))||[]);
  const [wishlist,setWishlist]=useState(()=>JSON.parse(localStorage.getItem('ll_wish'))||[]);
  const [cartOpen,setCartOpen]=useState(false),[wishOpen,setWishOpen]=useState(false);
  const [quick,setQuick]=useState(null);
  const [checkout,setCheckout]=useState(null);
  const [receipt,setReceipt]=useState(null);
  const [track,setTrack]=useState(false);
  const [scrolled,setScrolled]=useState(false);
  const [discCode,setDiscCode]=useState(''),[discount,setDiscountVal]=useState(0),[discErr,setDiscErr]=useState('');
  const [gift,setGift]=useState(false),[giftNote,setGiftNote]=useState('');
  const [bounce,setBounce]=useState(false),[addFx,setAddFx]=useState(false);
  const [toast,setToast]=useState('');
  const [showBuyBar,setShowBuyBar]=useState(false);

  useEffect(()=>{if(!loading)setTimeout(()=>setHeroVis(true),100);},[loading]);
  // Load live data from Supabase (or localStorage in demo mode) on mount
  useEffect(()=>{ (async()=>{
    try{
      const [prods,ords,notifs]=await Promise.all([db.getProducts(),db.getOrders(),db.getNotifs()]);
      if(prods&&prods.length){ setProducts(prods); }
      setOrders(ords||[]);
      setNotifications(notifs||[]);
    }catch(e){ console.warn('Data load failed, using local cache',e); }
  })(); },[]);
  useEffect(()=>{ if(!db.live) localStorage.setItem('ll_products',JSON.stringify(products)); },[products]);
  useEffect(()=>{ if(!db.live) localStorage.setItem('ll_orders',JSON.stringify(orders)); },[orders]);
  useEffect(()=>localStorage.setItem('ll_settings',JSON.stringify(settings)),[settings]);
  useEffect(()=>localStorage.setItem('ll_discounts',JSON.stringify(discounts)),[discounts]);
  useEffect(()=>{ if(!db.live) localStorage.setItem('ll_notifs',JSON.stringify(notifications)); },[notifications]);
  useEffect(()=>localStorage.setItem('ll_cart',JSON.stringify(cart)),[cart]);
  useEffect(()=>localStorage.setItem('ll_wish',JSON.stringify(wishlist)),[wishlist]);
  useEffect(()=>{const h=()=>{setScrolled(window.scrollY>50); const st=document.getElementById('studio'); if(st){const r=st.getBoundingClientRect(); setShowBuyBar(r.top<window.innerHeight&&r.bottom>0);}};window.addEventListener('scroll',h,{passive:true});return()=>window.removeEventListener('scroll',h);},[]);
  // share / restore design from URL
  useEffect(()=>{ try{ const q=new URLSearchParams(location.search); const pid=parseInt(q.get('p')); if(pid){const p=products.find(x=>x.id===pid); if(p){setSelected(p); const c=q.get('c'); if(c&&p.colors.includes('#'+c))setColor('#'+c); const pa=q.get('pat'); if(pa&&p.patterns.includes(pa))setPattern(pa);}} }catch(e){} },[]);

  const fireToast=(m)=>{setToast(m);setTimeout(()=>setToast(''),2200);};
  const pick=(p)=>{setSelected(p);const init={};partsForProduct(p).forEach(([k])=>init[k]=p.colors[0]);setPartColors(init);setColor(p.colors[0]);setPattern(p.patterns[0]);setSize(p.sizes[0]);setQuick(null);document.getElementById('studio')?.scrollIntoView({behavior:'smooth'});};
  const price=Math.round(selected.basePrice*size.mult);
  const addCart=()=>{ if(!selected.inStock)return; setCart([...cart,{productId:selected.id,productName:selected.name,color,pattern,sizeName:size.name,partColors:{...partColors},price,qty:1}]); setAddFx(true);setBounce(true);fireToast('Added to cart'); setTimeout(()=>{setAddFx(false);setBounce(false);},1100); };
  const addWish=()=>{setWishlist([...wishlist,{productId:selected.id,productName:selected.name,color,pattern,sizeName:size.name}]);fireToast('Saved to wishlist');};
  const moveWish=(i)=>{const w=wishlist[i];const p=products.find(x=>x.id===w.productId);if(p){const s=p.sizes.find(s=>s.name===w.sizeName)||p.sizes[0];setCart([...cart,{...w,price:Math.round(p.basePrice*s.mult),qty:1}]);fireToast('Added to cart');}setWishlist(wishlist.filter((_,j)=>j!==i));};
  const applyDisc=()=>{const c=discCode.trim().toUpperCase();if(discounts[c]){setDiscountVal(discounts[c]);setDiscErr('');fireToast(discounts[c]+'% off applied!');}else{setDiscountVal(0);setDiscErr('Invalid code');}};
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0); const total=sub*(1-discount/100);
  const place=async(customer)=>{
    const order={id:'LL-'+Date.now().toString(36).toUpperCase().slice(-6),date:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}),customer,items:cart.map(i=>({...i})),gift,giftNote,discount,total,status:'Processing'};
    try{
      // 1) Take payment (Razorpay if enabled, else manual/demo)
      const pay=await payWithRazorpay({ amount: total, customer });
      order.payment=pay;
      // 2) Save the order to the cloud (Supabase) — appears in admin on any device
      await db.addOrder(order);
      // 3) Update UI
      setOrders([...orders,order]); setCart([]); setDiscountVal(0); setDiscCode(''); setReceipt(order); setCheckout(null);
      fireToast(pay.paid?'Payment received — order placed!':'Order placed — thank you!');
    }catch(err){
      fireToast(err.message==='Payment cancelled'?'Payment cancelled':'Could not place order — try again');
    }
  };
  const share=()=>{ const url=`${location.origin}${location.pathname}?p=${selected.id}&c=${color.replace('#','')}&pat=${pattern}`; if(navigator.share){navigator.share({title:'My crochet design',url}).catch(()=>{});}else{navigator.clipboard?.writeText(url);fireToast('Design link copied');} };
  const notify=async(product)=>{ const em=prompt("Enter your email and we'll let you know when it's back in stock:"); if(em){ const n={email:em,productName:product.name,date:new Date().toLocaleDateString('en-IN')}; try{ await db.addNotif(n); }catch(e){} setNotifications([n,...notifications]); fireToast('We\'ll notify you when it\'s back'); } };

  if(loading)return <Preloader onDone={()=>setLoading(false)}/>;
  return (
    <div className="min-h-screen bg-base">
      <a href="#top" className="skip-link">Skip to content</a>
      <Toast msg={toast}/>
      <Navbar cartCount={cart.reduce((s,i)=>s+i.qty,0)} wishCount={wishlist.length} onCart={()=>setCartOpen(true)} onWish={()=>setWishOpen(true)} scrolled={scrolled} bounce={bounce}/>
      <main>
        <Hero vis={heroVis}/>
        <Press/>
        <Collection products={products} onPick={pick} onQuick={setQuick}/>
        <Studio products={products} selected={selected} setSelected={setSelected} color={color} setColor={setColor} pattern={pattern} setPattern={setPattern} size={size} setSize={setSize} partColors={partColors} setPartColors={setPartColors} onAdd={addCart} onWish={addWish} onShare={share} addFx={addFx}/>
        <Stats/>
        <HowItWorks/>
        <Testimonials/>
        <Gallery/>
        <FAQ/>
        <Story catImage={settings.catImage}/>
        <Newsletter/>
      </main>
      <Footer onTrack={()=>setTrack(true)} adminProps={{products,setProducts,orders,setOrders,settings,setSettings,discounts,setDiscounts,notifications,setNotifications}}/>

      {/* sticky mobile buy bar */}
      <div className={`buybar md:hidden ${showBuyBar&&!cartOpen?'show':''}`}>
        <div className="flex items-center justify-between gap-3 px-4 py-3">
          <div><p className="text-xs text-muted">{selected.name}</p><p className="font-semibold text-clay">₹{price.toLocaleString('en-IN')}</p></div>
          <button onClick={addCart} disabled={!selected.inStock} className="btn btn-primary px-6 py-3 text-sm flex-1 max-w-[180px]">{addFx?'Added ✓':'Add to cart'}</button>
        </div>
      </div>

      <Cart open={cartOpen} onClose={()=>setCartOpen(false)} cart={cart} setCart={setCart} products={products} discount={discount} setDiscount={()=>applyDisc()} discCode={discCode} setDiscCode={setDiscCode} discErr={discErr} onCheckout={()=>{if(cart.length){setCartOpen(false);setCheckout('review');}}} gift={gift} setGift={setGift} giftNote={giftNote} setGiftNote={setGiftNote}/>
      <Wishlist open={wishOpen} onClose={()=>setWishOpen(false)} wishlist={wishlist} setWishlist={setWishlist} onMove={moveWish}/>
      <QuickView product={quick} onClose={()=>setQuick(null)} onDesign={pick} onNotify={notify}/>
      <Checkout step={checkout} setStep={setCheckout} cart={cart} total={total} onPlace={place}/>
      {receipt&&<Receipt order={receipt} onClose={()=>setReceipt(null)}/>}
      <TrackModal open={track} onClose={()=>setTrack(false)} orders={orders}/>
      <a href="https://wa.me/919876543210?text=Hi%20Looped%20%26%20Lovely!" target="_blank" className="wa" aria-label="WhatsApp"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg></a>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
